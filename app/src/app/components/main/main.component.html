<div class="wrapper">
  <div class="hero">
    <p class="intro-eyebrow" #introEyebrow></p>
    <h1 class="intro-headline" #introHeadline></h1>
    <p class="intro-tagline" #introTagline></p>
  </div>

  <!-- Skip Animation Button -->
  <button *ngIf="showSkipButton" class="skip-anim" (click)="skipAnimation()" aria-label="Skip animation">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5 4 15 12 5 20 5 4"></polygon>
      <line x1="19" y1="5" x2="19" y2="19"></line>
    </svg>
    <span>Skip</span>
  </button>

  <!-- Reserves vertical room for the terminal's resting position; also hosts the
       "reconnect session" chip once the terminal has been closed. The terminal itself
       lives at <body> level (see app-terminal) so it can be dragged anywhere on the page. -->
  <div class="term-stage" #termStage>
    <button class="reopen-chip" [class.show]="terminalClosed" (click)="reopenTerminal()">
      <span>▸</span> reconnect session
    </button>
  </div>

  <app-terminal [anchor]="termStage" (closedChange)="onTerminalClosedChange($event)"></app-terminal>
</div>
